# Retool GraphQL Schema
# Derived from Retool Management REST API v2 and SCIM 2.0
# Source: https://docs.retool.com/reference/api/v2

scalar DateTime
scalar JSON
scalar UUID

# ─────────────────────────────────────────────
# Enums
# ─────────────────────────────────────────────

enum AppAccessLevel {
  PRIVATE
  PROTECTED
  PUBLIC
}

enum ResourceType {
  REST_API
  GRAPHQL
  GRPC
  POSTGRESQL
  MYSQL
  MSSQL
  MONGODB
  REDIS
  ELASTICSEARCH
  BIGQUERY
  SNOWFLAKE
  REDSHIFT
  S3
  DYNAMODB
  GOOGLE_SHEETS
  SALESFORCE
  STRIPE
  SLACK
  GITHUB
  CUSTOM
}

enum PermissionLevel {
  VIEWER
  EDITOR
  OWNER
  USE
  OWN
}

enum WorkflowJobStatus {
  PENDING
  RUNNING
  SUCCEEDED
  FAILED
  CANCELLED
}

enum WorkflowTriggerType {
  SCHEDULED
  WEBHOOK
  MANUAL
  API
}

enum GroupType {
  DEFAULT
  ADMIN
  CUSTOM
}

enum AuditLogAction {
  CREATE
  UPDATE
  DELETE
  VIEW
  EXECUTE
  LOGIN
  LOGOUT
  EXPORT
}

enum AuditLogResourceType {
  APP
  RESOURCE
  USER
  GROUP
  QUERY
  WORKFLOW
  API_TOKEN
  FOLDER
  SOURCE_CONTROL
}

enum DeploymentStatus {
  PENDING
  IN_PROGRESS
  SUCCEEDED
  FAILED
  ROLLED_BACK
}

enum GitBranchStatus {
  SYNCED
  AHEAD
  BEHIND
  DIVERGED
  CONFLICT
}

enum SSOProvider {
  GOOGLE
  OKTA
  AZURE_AD
  SAML
  OIDC
  GITHUB
}

enum ColumnType {
  TEXT
  NUMBER
  BOOLEAN
  DATE
  DATETIME
  JSON
  UUID
  ARRAY
}

enum ThemeMode {
  LIGHT
  DARK
  SYSTEM
}

enum SecretType {
  ENVIRONMENT_VARIABLE
  API_KEY
  CERTIFICATE
  OAUTH_TOKEN
}

# ─────────────────────────────────────────────
# App Domain
# ─────────────────────────────────────────────

type App {
  id: UUID!
  name: String!
  description: String
  folderId: UUID
  folder: Folder
  createdAt: DateTime!
  updatedAt: DateTime!
  createdBy: User
  updatedBy: User
  isGlobal: Boolean!
  isMobile: Boolean!
  accessLevel: AppAccessLevel!
  currentVersion: AppVersion
  versions: [AppVersion!]!
  permissions: [AppPermission!]!
  embeds: [AppEmbed!]!
  environment: AppEnvironment
  theme: Theme
  pageCount: Int
  customComponents: [CustomComponent!]!
  globalWidgets: [GlobalWidget!]!
}

type AppVersion {
  id: UUID!
  appId: UUID!
  app: App!
  versionNumber: Int!
  label: String
  createdAt: DateTime!
  createdBy: User
  isDeployed: Boolean!
  deployedAt: DateTime
  changelog: String
  snapshot: JSON
}

type AppPermission {
  id: UUID!
  appId: UUID!
  app: App!
  subjectType: String!
  subjectId: UUID!
  user: User
  group: Group
  permissionLevel: PermissionLevel!
  grantedAt: DateTime!
  grantedBy: User
}

type AppEmbed {
  id: UUID!
  appId: UUID!
  app: App!
  embedUrl: String!
  allowedOrigins: [String!]!
  isActive: Boolean!
  createdAt: DateTime!
  expiresAt: DateTime
}

type AppEnvironment {
  id: UUID!
  appId: UUID!
  name: String!
  variables: JSON
  createdAt: DateTime!
  updatedAt: DateTime!
}

# ─────────────────────────────────────────────
# Resource Domain
# ─────────────────────────────────────────────

type Resource {
  id: UUID!
  name: String!
  displayName: String
  type: ResourceType!
  config: ResourceConfig
  folderId: UUID
  folder: Folder
  createdAt: DateTime!
  updatedAt: DateTime!
  createdBy: User
  isGlobal: Boolean!
  environment: String
  queries: [Query!]!
}

type ResourceConfig {
  id: UUID!
  resourceId: UUID!
  host: String
  port: Int
  database: String
  username: String
  ssl: Boolean
  baseUrl: String
  headers: JSON
  authType: String
  options: JSON
  updatedAt: DateTime!
}

# ─────────────────────────────────────────────
# Query Domain
# ─────────────────────────────────────────────

type Query {
  id: UUID!
  name: String!
  resourceId: UUID
  resource: Resource
  appId: UUID
  app: App
  queryBody: JSON!
  transformEnabled: Boolean!
  transformCode: String
  runOnPageLoad: Boolean!
  createdAt: DateTime!
  updatedAt: DateTime!
  createdBy: User
}

type QueryLibrary {
  id: UUID!
  name: String!
  description: String
  resourceId: UUID!
  resource: Resource!
  queryBody: JSON!
  transformEnabled: Boolean!
  transformCode: String
  tags: [String!]!
  createdAt: DateTime!
  updatedAt: DateTime!
  createdBy: User
}

