# ─────────────────────────────────────────────
# Pagination & Connection Types
# ─────────────────────────────────────────────

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
  totalCount: Int!
}

type AppConnection {
  edges: [AppEdge!]!
  pageInfo: PageInfo!
}

type AppEdge {
  node: App!
  cursor: String!
}

type UserConnection {
  edges: [UserEdge!]!
  pageInfo: PageInfo!
}

type UserEdge {
  node: User!
  cursor: String!
}

type AuditLogConnection {
  edges: [AuditLogEdge!]!
  pageInfo: PageInfo!
}

type AuditLogEdge {
  node: AuditLog!
  cursor: String!
}

# ─────────────────────────────────────────────
# Input Types
# ─────────────────────────────────────────────

input CreateAppInput {
  name: String!
  description: String
  folderId: UUID
  isMobile: Boolean
  accessLevel: AppAccessLevel
  themeId: UUID
}

input UpdateAppInput {
  name: String
  description: String
  folderId: UUID
  accessLevel: AppAccessLevel
  themeId: UUID
}

input CreateUserInput {
  email: String!
  firstName: String
  lastName: String
  isAdmin: Boolean
  groupIds: [UUID!]
}

input UpdateUserInput {
  firstName: String
  lastName: String
  isAdmin: Boolean
}

input CreateGroupInput {
  name: String!
  displayName: String
  description: String
}

input UpdateGroupInput {
  name: String
  displayName: String
  description: String
}

input CreateResourceInput {
  name: String!
  type: ResourceType!
  config: JSON!
  folderId: UUID
  isGlobal: Boolean
  environment: String
}

input UpdateResourceInput {
  name: String
  config: JSON
  folderId: UUID
  isGlobal: Boolean
}

input CreateFolderInput {
  name: String!
  parentFolderId: UUID
  spaceId: UUID
}

input AppFilter {
  folderId: UUID
  accessLevel: AppAccessLevel
  isMobile: Boolean
  createdAfter: DateTime
  createdBefore: DateTime
  searchTerm: String
}

input AuditLogFilter {
  action: AuditLogAction
  resourceType: AuditLogResourceType
  actorId: UUID
  startDate: DateTime
  endDate: DateTime
}

input PaginationInput {
  first: Int
  after: String
  last: Int
  before: String
}

# ─────────────────────────────────────────────
# Root Types
# ─────────────────────────────────────────────

type RootQuery {
  # App queries
  app(id: UUID!): App
  apps(filter: AppFilter, pagination: PaginationInput): AppConnection!

  # Resource queries
  resource(id: UUID!): Resource
  resources: [Resource!]!

  # Query queries
  queryLibraryItem(id: UUID!): QueryLibrary
  queryLibrary: [QueryLibrary!]!

  # Workflow queries
  workflowJob(id: UUID!): WorkflowJob
  workflowJobs(workflowId: UUID!): [WorkflowJob!]!
  workflowTrigger(id: UUID!): WorkflowTrigger

  # User & Group queries
  user(id: UUID!): User
  users(pagination: PaginationInput): UserConnection!
  group(id: UUID!): Group
  groups: [Group!]!
  me: User

  # Organization queries
  folder(id: UUID!): Folder
  folders: [Folder!]!
  space(id: UUID!): Space
  spaces: [Space!]!

  # Database queries
  retoolDB: RetoolDB
  table(id: UUID!): Table
  tableRows(tableId: UUID!, limit: Int, offset: Int): [TableRow!]!

  # Enterprise queries
  auditLogs(filter: AuditLogFilter, pagination: PaginationInput): AuditLogConnection!
  usage(period: String!): Usage
  sso: SSO
  enterpriseConfig: EnterpriseConfig
  scimConfig: SCIMConfig

  # Source control queries
  sourceControl: SourceControl
  gitBranch(id: UUID!): GitBranch
  gitBranches: [GitBranch!]!
  commit(sha: String!): Commit
  deployments: [Deployment!]!

  # Platform queries
  theme(id: UUID!): Theme
  themes: [Theme!]!
  brandingConfig: BrandingConfig
  customComponents: [CustomComponent!]!
  globalWidgets: [GlobalWidget!]!

  # Developer queries
  apiToken(id: UUID!): ApiToken
  apiTokens: [ApiToken!]!
  agent(id: UUID!): Agent
  agents: [Agent!]!
}

type Mutation {
  # App mutations
  createApp(input: CreateAppInput!): App!
  updateApp(id: UUID!, input: UpdateAppInput!): App!
  deleteApp(id: UUID!): Boolean!
  deployApp(appId: UUID!, versionId: UUID): AppVersion!

  # User mutations
  createUser(input: CreateUserInput!): User!
  updateUser(id: UUID!, input: UpdateUserInput!): User!
  deleteUser(id: UUID!): Boolean!
  addUserToGroup(userId: UUID!, groupId: UUID!): Group!
  removeUserFromGroup(userId: UUID!, groupId: UUID!): Group!

  # Group mutations
  createGroup(input: CreateGroupInput!): Group!
  updateGroup(id: UUID!, input: UpdateGroupInput!): Group!
  deleteGroup(id: UUID!): Boolean!

  # Resource mutations
  createResource(input: CreateResourceInput!): Resource!
  updateResource(id: UUID!, input: UpdateResourceInput!): Resource!
  deleteResource(id: UUID!): Boolean!

  # Folder mutations
  createFolder(input: CreateFolderInput!): Folder!
  updateFolder(id: UUID!, name: String!): Folder!
  deleteFolder(id: UUID!): Boolean!

  # Permission mutations
  grantPermission(subjectType: String!, subjectId: UUID!, objectType: String!, objectId: UUID!, level: PermissionLevel!): Permission!
  revokePermission(id: UUID!): Boolean!

  # Database mutations
  createTable(databaseId: UUID!, name: String!, columns: [JSON!]!): Table!
  deleteTable(id: UUID!): Boolean!
  insertRow(tableId: UUID!, data: JSON!): TableRow!
  updateRow(id: UUID!, data: JSON!): TableRow!
  deleteRow(id: UUID!): Boolean!

  # Source control mutations
  createDeployment(branchName: String!, environment: String!): Deployment!
  rollbackDeployment(deploymentId: UUID!): Deployment!

  # Developer mutations
  createApiToken(name: String!, description: String, expiresAt: DateTime): ApiToken!
  deleteApiToken(id: UUID!): Boolean!
}

schema {
  query: RootQuery
  mutation: Mutation
}
