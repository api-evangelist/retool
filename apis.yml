aid: retool
name: Retool
description: Retool is a low-code platform for building internal tools, dashboards,
  and admin panels quickly using pre-built UI components that connect to any database
  or API. Retool provides a management REST API for programmatically administering
  users, groups, apps, resources, permissions, and source control integrations. It
  supports enterprise features including SSO, SCIM 2.0 provisioning, self-hosting,
  and AI-powered app generation.
type: Index
