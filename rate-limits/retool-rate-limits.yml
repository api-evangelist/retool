specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Retool
providerId: retool
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Internal Tools
  - Low Code
description: Retool exposes a Management API (apps, themes, resources, folders, spaces, source control,
  users/groups/permissions, SSO) and a SCIM 2.0 API for identity-provider provisioning. Public Retool
  documentation does not publish per-second / per-minute rate-limit numbers for these admin APIs; throughput
  is bounded primarily by plan-tied workflow-run quotas and the per-tenant deployment.
sources:
  - https://docs.retool.com/org-users/concepts/retool-api
  - https://retool.com/pricing
notes: No public numeric rate limits for the Management or SCIM APIs; the consumption ceiling that is
  publicly documented is the workflow-runs quota (500/mo Free, 5,000/mo Team), which lives in plans/.
limits:
  - name: Management API throttling
    scope: tenant
    metric: varies
    limit: 'see https://docs.retool.com/org-users/concepts/retool-api — not numerically published'
  - name: SCIM 2.0 API throttling
    scope: tenant
    metric: varies
    limit: 'see Retool SCIM 2.0 reference — not numerically published'
  - name: Workflow runs (plan-bound)
    scope: tenant
    metric: workflow_runs_per_month
    limit: 'depends on plan: Free 500, Team 5,000, Business/Enterprise per contract'
    timeFrame: month
policies:
  - name: Tenant-Scoped
    description: Retool API access is scoped to the customer tenant; all administrative calls are authenticated
      as a Retool API token tied to the org.
  - name: Plan-Bound Workflow Runs
    description: The most consequential consumption ceiling is the workflow-runs quota, set by the
      active subscription plan rather than HTTP throttling.
  - name: SCIM Recommendation
    description: Retool documentation recommends the Management API for automation when possible, with
      SCIM 2.0 used specifically for identity-provider integration.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
