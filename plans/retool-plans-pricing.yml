specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Retool
providerId: retool
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Admin Panel
  - Dashboard
  - Internal Tools
  - Low Code
  - No Code
description: Retool prices internal-tooling subscriptions per builder (the user editing apps), with separate
  per-user rates for internal end-users and external (customer-facing portal) users. Workflow runs and
  the Retool Database have plan-level quotas. The Retool Management API and SCIM 2.0 API are administrative
  surfaces that ship with the platform — they do not have a separate per-call price. Prices below are
  the published list rates as of fetch.
sources:
  - https://retool.com/pricing
  - https://docs.retool.com/org-users/concepts/retool-api
plans:
  - id: retool-free
    name: Free
    type: freemium
    description: Free tier — up to 5 users, 500 workflow runs/month, 5 GB Retool Database.
    entries:
      - label: Builder Seat
        name: builder_seat
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '$0/month per builder'
        userMultiplied: true
      - label: Total Users
        name: total_users
        type: quota
        metric: user
        limit: 5
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Workflow Runs
        name: workflow_runs
        type: quota
        metric: run
        limit: 500
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Retool Database
        name: retool_database
        type: quota
        metric: gb
        limit: 5
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: Up to 5 users
      - name: 500 workflow runs/month
      - name: 5 GB Retool Database
  - id: retool-team
    name: Team
    type: subscription
    description: Team tier — per-builder pricing billed annually, more than 5 users supported, 5,000
      workflow runs/month.
    entries:
      - label: Builder Seat (billed annually)
        name: builder_seat
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '$50/month per builder'
        userMultiplied: true
      - label: Workflow Runs
        name: workflow_runs
        type: quota
        metric: run
        limit: 5000
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: More than 5 users
      - name: 5,000 workflow runs/month
  - id: retool-business
    name: Business
    type: subscription
    description: Business tier — per-builder pricing with rich permission controls, portals, and embedded
      apps for larger organizations.
    entries:
      - label: Builder Seat
        name: builder_seat
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '$50/month per builder'
        userMultiplied: true
      - label: Internal End User
        name: internal_end_user
        type: subscription
        metric: user
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '$5–$15/month per user'
        userMultiplied: true
      - label: External User (Portals / Embedded Apps)
        name: external_user
        type: tiered
        metric: user
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: 'Free for first 0–50; declining tiers down to $4/month per user at 500+'
        userMultiplied: true
    elements:
      - name: Rich permission controls
      - name: Portals and embedded apps
      - name: External user pricing (Portals)
  - id: retool-enterprise
    name: Enterprise
    type: enterprise
    description: Enterprise tier — custom pricing with SAML / OpenID Connect SSO and full white-labeling.
    entries:
      - label: Enterprise Agreement
        name: enterprise_agreement
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: SAML / OpenID Connect SSO
      - name: Full white-labeling
      - name: Dedicated account management
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
