naftiko: 1.0.0-alpha2
info:
  label: Retool Management API — Groups
  description: 'Retool Management API — Groups. 4 operations. Lead operation: List Groups. Self-contained Naftiko capability
    covering one Retool business surface.'
  tags:
  - Retool
  - Groups
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RETOOL_API_KEY: RETOOL_API_KEY
capability:
  consumes:
  - type: http
    namespace: management-groups
    baseUri: https://api.retool.com/v1
    description: Retool Management API — Groups business capability. Self-contained, no shared references.
    resources:
    - name: groups
      path: /groups
      operations:
      - name: listgroups
        method: GET
        description: List Groups
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: creategroup
        method: POST
        description: Create Group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: groups-groupId-members
      path: /groups/{groupId}/members
      operations:
      - name: addgroupmember
        method: POST
        description: Add Member to Group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: groups-groupId-members-userId
      path: /groups/{groupId}/members/{userId}
      operations:
      - name: removegroupmember
        method: DELETE
        description: Remove Member from Group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.RETOOL_API_KEY}}'
  exposes:
  - type: rest
    namespace: management-groups-rest
    port: 8080
    description: REST adapter for Retool Management API — Groups. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/groups
      name: groups
      description: REST surface for groups.
      operations:
      - method: GET
        name: listgroups
        description: List Groups
        call: management-groups.listgroups
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: creategroup
        description: Create Group
        call: management-groups.creategroup
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/groups/{groupid}/members
      name: groups-groupid-members
      description: REST surface for groups-groupId-members.
      operations:
      - method: POST
        name: addgroupmember
        description: Add Member to Group
        call: management-groups.addgroupmember
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/groups/{groupid}/members/{userid}
      name: groups-groupid-members-userid
      description: REST surface for groups-groupId-members-userId.
      operations:
      - method: DELETE
        name: removegroupmember
        description: Remove Member from Group
        call: management-groups.removegroupmember
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: management-groups-mcp
    port: 9090
    transport: http
    description: MCP adapter for Retool Management API — Groups. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-groups
      description: List Groups
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: management-groups.listgroups
      outputParameters:
      - type: object
        mapping: $.
    - name: create-group
      description: Create Group
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: management-groups.creategroup
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: add-member-group
      description: Add Member to Group
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: management-groups.addgroupmember
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: remove-member-group
      description: Remove Member from Group
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: management-groups.removegroupmember
      outputParameters:
      - type: object
        mapping: $.
