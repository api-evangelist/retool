naftiko: 1.0.0-alpha2
info:
  label: Retool Management API — Apps
  description: 'Retool Management API — Apps. 5 operations. Lead operation: List Apps. Self-contained Naftiko capability covering
    one Retool business surface.'
  tags:
  - Retool
  - Apps
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RETOOL_API_KEY: RETOOL_API_KEY
capability:
  consumes:
  - type: http
    namespace: management-apps
    baseUri: https://api.retool.com/v1
    description: Retool Management API — Apps business capability. Self-contained, no shared references.
    resources:
    - name: apps
      path: /apps
      operations:
      - name: listapps
        method: GET
        description: List Apps
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createapp
        method: POST
        description: Create App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: apps-appId
      path: /apps/{appId}
      operations:
      - name: getapp
        method: GET
        description: Get App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateapp
        method: PUT
        description: Update App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteapp
        method: DELETE
        description: Delete App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.RETOOL_API_KEY}}'
  exposes:
  - type: rest
    namespace: management-apps-rest
    port: 8080
    description: REST adapter for Retool Management API — Apps. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/apps
      name: apps
      description: REST surface for apps.
      operations:
      - method: GET
        name: listapps
        description: List Apps
        call: management-apps.listapps
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createapp
        description: Create App
        call: management-apps.createapp
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/apps/{appid}
      name: apps-appid
      description: REST surface for apps-appId.
      operations:
      - method: GET
        name: getapp
        description: Get App
        call: management-apps.getapp
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateapp
        description: Update App
        call: management-apps.updateapp
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteapp
        description: Delete App
        call: management-apps.deleteapp
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: management-apps-mcp
    port: 9090
    transport: http
    description: MCP adapter for Retool Management API — Apps. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-apps
      description: List Apps
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: management-apps.listapps
      outputParameters:
      - type: object
        mapping: $.
    - name: create-app
      description: Create App
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: management-apps.createapp
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-app
      description: Get App
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: management-apps.getapp
      outputParameters:
      - type: object
        mapping: $.
    - name: update-app
      description: Update App
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: management-apps.updateapp
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-app
      description: Delete App
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: management-apps.deleteapp
      outputParameters:
      - type: object
        mapping: $.
