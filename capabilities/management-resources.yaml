naftiko: 1.0.0-alpha2
info:
  label: Retool Management API — Resources
  description: 'Retool Management API — Resources. 1 operations. Lead operation: List Resources. Self-contained Naftiko capability
    covering one Retool business surface.'
  tags:
  - Retool
  - Resources
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RETOOL_API_KEY: RETOOL_API_KEY
capability:
  consumes:
  - type: http
    namespace: management-resources
    baseUri: https://api.retool.com/v1
    description: Retool Management API — Resources business capability. Self-contained, no shared references.
    resources:
    - name: resources
      path: /resources
      operations:
      - name: listresources
        method: GET
        description: List Resources
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.RETOOL_API_KEY}}'
  exposes:
  - type: rest
    namespace: management-resources-rest
    port: 8080
    description: REST adapter for Retool Management API — Resources. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/resources
      name: resources
      description: REST surface for resources.
      operations:
      - method: GET
        name: listresources
        description: List Resources
        call: management-resources.listresources
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: management-resources-mcp
    port: 9090
    transport: http
    description: MCP adapter for Retool Management API — Resources. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-resources
      description: List Resources
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: management-resources.listresources
      outputParameters:
      - type: object
        mapping: $.
