naftiko: 1.0.0-alpha2
info:
  label: Retool Management API — Folders
  description: 'Retool Management API — Folders. 2 operations. Lead operation: List Folders. Self-contained Naftiko capability
    covering one Retool business surface.'
  tags:
  - Retool
  - Folders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RETOOL_API_KEY: RETOOL_API_KEY
capability:
  consumes:
  - type: http
    namespace: management-folders
    baseUri: https://api.retool.com/v1
    description: Retool Management API — Folders business capability. Self-contained, no shared references.
    resources:
    - name: folders
      path: /folders
      operations:
      - name: listfolders
        method: GET
        description: List Folders
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: folderType
          in: query
          type: string
          description: Filter folders by type (app, resource, workflow).
      - name: createfolder
        method: POST
        description: Create Folder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.RETOOL_API_KEY}}'
  exposes:
  - type: rest
    namespace: management-folders-rest
    port: 8080
    description: REST adapter for Retool Management API — Folders. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/folders
      name: folders
      description: REST surface for folders.
      operations:
      - method: GET
        name: listfolders
        description: List Folders
        call: management-folders.listfolders
        with:
          folderType: rest.folderType
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createfolder
        description: Create Folder
        call: management-folders.createfolder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: management-folders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Retool Management API — Folders. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-folders
      description: List Folders
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: management-folders.listfolders
      with:
        folderType: tools.folderType
      outputParameters:
      - type: object
        mapping: $.
    - name: create-folder
      description: Create Folder
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: management-folders.createfolder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
